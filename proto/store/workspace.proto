syntax = "proto3";

package memos.store;

option go_package = "gen/store";

// Workspace is a knowledge base that groups memos under a hierarchy of folders.
message Workspace {
  int32 id = 1;
  string uid = 2;
  int32 creator_id = 3;
  string title = 4;
  int64 created_ts = 5;
  int64 updated_ts = 6;
}

// WorkspaceFolder represents a (possibly empty) folder path within a workspace.
// Folders that contain at least one memo do not require a row here; this table
// exists so empty folders and explicit renames can be tracked.
message WorkspaceFolder {
  int32 id = 1;
  int32 workspace_id = 2;
  // Slash-separated folder path relative to the workspace root, e.g. "garden/notes".
  string path = 3;
  int64 created_ts = 4;
}
